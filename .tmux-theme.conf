# Theme settings split by tmux version. Keep each if-shell action to one tmux
# command so tmux 1.0 and modern tmux both parse it reliably.

if-shell 'if command -v tmux >/dev/null 2>&1 && command -v awk >/dev/null 2>&1; then v=$(tmux -V | awk "{print \$2}"); major=${v%%.*}; rest=${v#*.}; minor=${rest%%[!0-9]*}; [ -n "$minor" ] || minor=0; [ "$major" -lt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -lt 1 ]; }; else false; fi' 'set -g status-bg colour234'
