# Set that stupid Esc-Wait off, so VI works again
set -sg escape-time 0

# All commands start with C-a
set -g prefix C-a

# Use 256 colors
set -g default-terminal "screen-256color"

# Use legacy mouse options before tmux 2.1.
if-shell 'if command -v tmux >/dev/null 2>&1 && command -v awk >/dev/null 2>&1; then v=$(tmux -V | awk "{print \$2}"); major=${v%%.*}; rest=${v#*.}; minor=${rest%%[!0-9]*}; [ -n "$minor" ] || minor=0; [ "$major" -lt 2 ] || { [ "$major" -eq 2 ] && [ "$minor" -lt 1 ]; }; else false; fi' \
  'setw -g mode-mouse on \; set -g mouse-select-window on \; set -g mouse-select-pane on \; set -g mouse-resize-pane on \; set -g mouse-utf on'

# Start numbering at 1
set -g base-index 1
if-shell 'if command -v tmux >/dev/null 2>&1 && command -v awk >/dev/null 2>&1; then v=$(tmux -V | awk "{print \$2}"); major=${v%%.*}; rest=${v#*.}; minor=${rest%%[!0-9]*}; [ -n "$minor" ] || minor=0; [ "$major" -gt 1 ] || { [ "$major" -eq 1 ] && [ "$minor" -ge 6 ]; }; else false; fi' \
  'setw -g pane-base-index 1'
if-shell 'if command -v tmux >/dev/null 2>&1 && command -v awk >/dev/null 2>&1; then v=$(tmux -V | awk "{print \$2}"); major=${v%%.*}; rest=${v#*.}; minor=${rest%%[!0-9]*}; [ -n "$minor" ] || minor=0; [ "$major" -gt 1 ] || { [ "$major" -eq 1 ] && [ "$minor" -ge 7 ]; }; else false; fi' \
  'set -g renumber-windows on'

set -g allow-rename off

set -g history-limit 5000

# Bindings
unbind %
bind | split-window -h
bind _ split-window -v

unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
#bind -t vi-copy 'v' begin-selection
#bind -t vi-copy 'y' copy-selection
#bind -t vi-copy 'V' rectangle-toggle

# Move system clipboard into tmux paste buffer.
bind C-p run-shell 'if ! command -v tmux >/dev/null 2>&1; then exit 0; elif command -v pbpaste >/dev/null 2>&1; then tmux set-buffer "$(pbpaste)" && tmux paste-buffer; elif command -v xclip >/dev/null 2>&1; then tmux set-buffer "$(xclip -o)" && tmux paste-buffer; else tmux display-message "No clipboard reader found: install pbpaste or xclip"; fi'
# Move tmux copy buffer into system clipboard.
bind C-y run-shell 'if ! command -v tmux >/dev/null 2>&1; then exit 0; elif command -v pbcopy >/dev/null 2>&1; then tmux save-buffer - | pbcopy; elif command -v xclip >/dev/null 2>&1; then tmux save-buffer - | xclip -i; else tmux display-message "No clipboard writer found: install pbcopy or xclip"; fi'

bind C-a send-prefix
bind a last-window

# Smart pane switching with awareness of vim splits
is_vim='command -v grep >/dev/null 2>&1 && echo "#{pane_current_command}" | grep -iqE "(^|\/)(g?(view|n?vim?)(diff)?|git)$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind C-l send-keys 'C-l'

bind -n M-h previous-window
bind -n M-l next-window
bind -n M-Left previous-window
bind -n M-Right next-window

# Reload the config.
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Set panel title
bind t command-prompt -p "Panel title:" "send-keys 'printf \"'\\033]2;%%\\033\\\\'\"' C-m"

# Do not load them if remote, since it's probably a nested tmux and I want an
# easy way to differentiate the two
if-shell 'test -z "$SSH_CLIENT" && test -r "$HOME/.tmux-theme.conf"' \
  "source-file ~/.tmux-theme.conf"

if-shell 'if command -v tmux >/dev/null 2>&1 && command -v awk >/dev/null 2>&1; then v=$(tmux -V | awk "{print \$2}"); major=${v%%.*}; rest=${v#*.}; minor=${rest%%[!0-9]*}; [ -n "$minor" ] || minor=0; [ "$major" -gt 1 ] || { [ "$major" -eq 1 ] && [ "$minor" -ge 7 ]; }; else false; fi' \
  'set -g display-panes-time 1500'
